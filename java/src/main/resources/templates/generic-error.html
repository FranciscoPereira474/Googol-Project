<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>
    <meta http-equiv="refresh" content="5;url=/?">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #343a40;
        }

        .error-container {
            text-align: center;
            background-color: #ffffff;
            padding: 3em 2em;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 0.5em;
            color: #dc3545;
        }

        p {
            font-size: 1.2em;
            color: #6c757d;
        }

        .redirect {
            margin-top: 1em;
            font-size: 0.95em;
            color: #495057;
        }
    </style>
</head>
<body>
<div class="error-container">
    <h1>Page Not Found</h1>
    <p>We're redirecting you to the home page...</p>
    <p class="redirect">If you're not redirected, <a href="/index.html">click here</a>.</p>
</div>
</body>
</html>
